<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In - Snapshot Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-8 shadow-xl">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-semibold text-white">Snapshot Finance</h1>
                <p class="text-sm text-slate-400 mt-1">Sign in to your dashboard</p>
            </div>
            {% if form.errors %}
            <div class="bg-red-900/30 border border-red-800 text-red-400 rounded-lg px-4 py-3 mb-4 text-sm">
                Invalid username or password.
            </div>
            {% endif %}
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label for="id_username" class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                    <input type="text" name="username" id="id_username" autofocus
                           class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                </div>
                <div>
                    <label for="id_password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
                    <input type="password" name="password" id="id_password"
                           class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-lg px-4 py-2 transition-colors">
                    Sign In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
